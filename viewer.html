<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DWES — Visor de apuntes</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    nav { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav span { color: #475569; }
    .content { max-width: 860px; margin: 40px auto; padding: 0 24px 80px; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .content-inner { padding: 40px; }
    h1,h2,h3,h4 { margin: 1.4em 0 0.5em; color: #0f172a; }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
    h2 { font-size: 1.3rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; }
    p { line-height: 1.7; margin: 0.8em 0; }
    pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    code { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; }
    :not(pre) > code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #0369a1; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
    th { background: #f8fafc; font-weight: 600; }
    ul, ol { padding-left: 1.5em; margin: 0.8em 0; }
    li { line-height: 1.7; margin: 0.2em 0; }
    blockquote { border-left: 4px solid #3b82f6; margin: 1em 0; padding: 8px 16px; background: #f0f9ff; color: #0369a1; border-radius: 0 6px 6px 0; }
    a { color: #2563eb; }
    #error { padding: 40px; color: #dc2626; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Inicio</a>
    <span>/</span>
    <span id="nav-title">Cargando...</span>
  </nav>
  <div class="content">
    <div id="error" style="display:none">No se pudo cargar el archivo.</div>
    <div class="content-inner" id="output"></div>
  </div>
  <script>
    var file = new URLSearchParams(location.search).get('file');
    if (!file) { document.getElementById('error').style.display = 'block'; }
    else {
      document.getElementById('nav-title').textContent = file.split('/').pop().replace('.md','');
      fetch(file)
        .then(function(r) { if (!r.ok) throw new Error(); return r.text(); })
        .then(function(md) { document.getElementById('output').innerHTML = marked.parse(md); })
        .catch(function() { document.getElementById('error').style.display = 'block'; });
    }
  </script>
</body>
</html>
