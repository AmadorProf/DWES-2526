server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # intenta el archivo estático, si no existe pasa a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesar PHP vía FastCGI - esto es clave
    location ~ \.php$ {
        # evita que nginx entregue php como fichero
        try_files $uri =404;

        # ruta del script que se ejecutará
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # asegúrate que SCRIPT_FILENAME apunta al document root correcto
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # pasar al servicio php-fpm definido en docker-compose: "php:9000"
        fastcgi_pass php:9000;

        fastcgi_index index.php;
        include fastcgi_params;
    }

    # activos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
        expires max;
        access_log off;
    }
}
